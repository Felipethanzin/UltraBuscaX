<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraBuscaX</title>
    <link rel="stylesheet" href="../css/cnpj.css">
</head>
<body>

<header class="header">
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/906/906175.png">
        <span>UltraBuscaX</span>
    </div>

    <nav class="menu">
        <a href="../home/home.html">Home</a>
        <a href="../suporte/suporte.html">Suporte</a>
    </nav>
</header>

<main class="main-grid">

    <!-- LADO ESQUERDO (INFO / IMAGEM) -->
    <div class="hero">
        <h1>Consulta Inteligente</h1>
        <p>Busque informações completas de empresas usando CNPJ em tempo real.</p>

        <img src="https://cdn-icons-png.flaticon.com/512/4149/4149676.png" alt="ilustração">
    </div>

    <!-- LADO DIREITO (BUSCA) -->
    <div class="form">

        <h2>Buscar CNPJ</h2>

        <div class="input-group">
            <span>🔎</span>
            <input 
                type="text" 
                id="cnpj" 
                placeholder="00.000.000/0000-00"
                maxlength="18"
                oninput="formatarCNPJ(this)"
            >
        </div>

        <button onclick="buscarCNPJ()">Buscar Dados</button>

        <!-- LOADING -->
        <div id="loading" class="loading hidden"></div>

        <!-- RESULTADO -->
        <div id="resultado" class="resultado-box">
            <p class="placeholder">Nenhuma consulta realizada...</p>
        </div>

    </div>

</main>
<script>
// 🎯 Máscara CNPJ
function formatarCNPJ(input) {
    let value = input.value.replace(/\D/g, "");

    value = value.replace(/^(\d{2})(\d)/, "$1.$2");
    value = value.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
    value = value.replace(/\.(\d{3})(\d)/, ".$1/$2");
    value = value.replace(/(\d{4})(\d)/, "$1-$2");

    input.value = value;
}

// 🔍 Buscar com BRASILAPI 🔥
async function buscarCNPJ() {
    const cnpj = document.getElementById("cnpj").value.replace(/\D/g, "");
    const resultado = document.getElementById("resultado");
    const loading = document.getElementById("loading");

    if (!cnpj || cnpj.length !== 14) {
        resultado.innerHTML = "<p>Digite um CNPJ válido.</p>";
        return;
    }

    loading.classList.remove("hidden");
    resultado.innerHTML = "";

    try {
        const response = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
        const data = await response.json();

        loading.classList.add("hidden");

        resultado.innerHTML = `
            <div class="grid">
                <div><strong>Razão Social</strong><span>${data.razao_social || "N/A"}</span></div>
                <div><strong>Nome Fantasia</strong><span>${data.nome_fantasia || "N/A"}</span></div>
                <div><strong>CNPJ</strong><span>${data.cnpj || "N/A"}</span></div>
                <div><strong>Situação</strong><span>${data.descricao_situacao_cadastral || "N/A"}</span></div>
                <div><strong>Data Abertura</strong><span>${data.data_inicio_atividade || "N/A"}</span></div>
                <div><strong>Tipo</strong><span>${data.descricao_tipo_de_logradouro || "N/A"}</span></div>
                <div><strong>Endereço</strong><span>${data.logradouro || ""}, ${data.numero || ""}</span></div>
                <div><strong>Bairro</strong><span>${data.bairro || "N/A"}</span></div>
                <div><strong>Cidade</strong><span>${data.municipio || "N/A"}</span></div>
                <div><strong>UF</strong><span>${data.uf || "N/A"}</span></div>
                <div><strong>CEP</strong><span>${data.cep || "N/A"}</span></div>
                <div><strong>Capital Social</strong><span>R$ ${data.capital_social || "N/A"}</span></div>
            </div>
        `;

    } catch (error) {
        loading.classList.add("hidden");
        resultado.innerHTML = "<p>❌ CNPJ não encontrado ou erro na API.</p>";
    }
}
</script>
</body>
</html>
